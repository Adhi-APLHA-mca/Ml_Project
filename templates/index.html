<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Math Score Predictor</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; }
      .container { max-width: 600px; margin: auto; }
      .section { background: #f4f4f4; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
      label { display: block; margin-top: 12px; }
      input, select { width: 100%; padding: 8px; margin-top: 4px; }
      button { margin-top: 16px; padding: 10px 16px; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 4px; }
      button:hover { background: #003f7f; }
      #result { margin-top: 16px; padding: 16px; background: #eef; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Student Math Score Predictor</h1>

      <div class="section">
        <h2>Train Model</h2>
        <form id="train-form">
          <button type="submit">Train Model</button>
        </form>
        <div id="train-result"></div>
      </div>

      <div class="section">
        <h2>Predict Math Score</h2>
        <form id="predict-form">
          <label>Gender</label>
          <select name="gender">
            <option value="female">female</option>
            <option value="male">male</option>
          </select>

          <label>Race / Ethnicity</label>
          <select name="race_ethnicity">
            <option value="group A">group A</option>
            <option value="group B">group B</option>
            <option value="group C">group C</option>
            <option value="group D">group D</option>
            <option value="group E">group E</option>
          </select>

          <label>Parental Level of Education</label>
          <select name="parental_level_of_education">
            <option value="some high school">some high school</option>
            <option value="high school">high school</option>
            <option value="some college">some college</option>
            <option value="associate's degree">associate's degree</option>
            <option value="bachelor's degree">bachelor's degree</option>
            <option value="master's degree">master's degree</option>
          </select>

          <label>Lunch</label>
          <select name="lunch">
            <option value="standard">standard</option>
            <option value="free/reduced">free/reduced</option>
          </select>

          <label>Test Preparation Course</label>
          <select name="test_preparation_course">
            <option value="none">none</option>
            <option value="completed">completed</option>
          </select>

          <label>Reading Score</label>
          <input type="number" name="reading_score" min="0" max="100" value="70" required />

          <label>Writing Score</label>
          <input type="number" name="writing_score" min="0" max="100" value="70" required />

          <button type="submit">Predict</button>
        </form>
        <div id="prediction-result"></div>
      </div>
    </div>

    <script>
      document.getElementById("train-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const response = await fetch("/train", { method: "POST" });
        const data = await response.json();
        document.getElementById("train-result").textContent = data.status + ": " + data.model_path;
      });

      document.getElementById("predict-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const response = await fetch("/predict", { method: "POST", body: formData });
        const data = await response.json();
        document.getElementById("prediction-result").textContent = "Predicted math score: " + data.prediction.toFixed(2);
      });
    </script>
  </body>
</html>
